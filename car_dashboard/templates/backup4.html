{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mustang Cyber-HUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- VARIABLES --- */
        :root {
            --theme-color: #00f2ff; /* Changed to Cyan for Cyber look, adjustable */
            --theme-shadow: rgba(0, 242, 255, 0.6);
            --glass-bg: linear-gradient(180deg, rgba(10,10,10,0.95) 0%, rgba(0,0,0,0.98) 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s ease; }
        
        body {
            background-color: #000;
            color: white;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
            font-family: 'Rajdhani', sans-serif;
        }

        /* --- 1. SCANNER EFFECT LAYER --- */
        .scan-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
            background: linear-gradient(to bottom, transparent 0%, rgba(0, 242, 255, 0.2) 50%, transparent 100%);
            opacity: 0;
            background-size: 100% 50px;
            background-repeat: no-repeat;
        }
        /* Animation class for scanner */
        body.scanning .scan-overlay {
            animation: scan-screen 2s ease-in-out forwards;
        }
        @keyframes scan-screen {
            0% { background-position: 0 -10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { background-position: 0 110%; opacity: 0; }
        }

        /* --- 2. LAYERS SYSTEM --- */
        .layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s;
            display: flex; justify-content: center; align-items: center; z-index: 5; 
        }
        .layer.active { opacity: 1; visibility: visible; }

        /* 3. CAR LAYER (With Ignition) */
        .background-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url("{% static 'car_dashboard/images/dashboard_car.png' %}") no-repeat;
            background-size: 65% auto; background-position: center 55%; 
            background-color: #000; z-index: 0; 
            opacity: 1; transition: opacity 0.5s ease;
        }
        body.mode-overlay .background-layer { opacity: 0.2; filter: blur(8px); }

        /* --- ADVANCED ANIMATION: HEADLIGHT FLASH --- */
        @keyframes car-ignition {
            0% { filter: brightness(0) blur(15px); transform: scale(0.95); }
            10% { filter: brightness(0.1) blur(10px); }
            30% { filter: brightness(2.5) blur(0px) contrast(1.5); transform: scale(1.02); } /* FLASH */
            100% { filter: brightness(1) blur(0px); transform: scale(1); }
        }
        .car-animating .background-layer {
            animation: car-ignition 2.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
        }

        /* --- 4. PANELS (Holographic & Breathing) --- */
        .dashboard-panel {
            position: absolute; top: 20%; bottom: 20%; width: 180px;
            background: linear-gradient(180deg, rgba(20,20,20,0.6) 0%, rgba(0,0,0,0.8) 100%);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 35px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.05);
            display: flex; flex-direction: column; justify-content: space-evenly; align-items: center;
            z-index: 10; opacity: 0; /* Start hidden for animation */
        }
        .panel-left { left: 40px; } .panel-right { right: 40px; }

        /* Holographic Entry Animation */
        @keyframes hologram-entry {
            0% { opacity: 0; transform: perspective(1000px) rotateX(20deg) scale(0.8); filter: hue-rotate(90deg); }
            20% { opacity: 0.5; transform: perspective(1000px) rotateX(-10deg) scale(1.05); }
            40% { opacity: 0.8; filter: brightness(2); }
            60% { opacity: 0.4; } /* Flicker */
            80% { opacity: 1; }
            100% { opacity: 1; transform: perspective(1000px) rotateX(0deg) scale(1); }
        }
        
        /* Breathing Animation (Idle Float) */
        @keyframes panel-float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        /* Apply animations when class is present */
        .panels-active .dashboard-panel {
            opacity: 1;
            animation: hologram-entry 1s ease-out forwards, panel-float 6s ease-in-out infinite 1s; /* Float starts after 1s */
        }

        /* HIDE UI WHEN MENU IS OPEN */
        body.mode-overlay .dashboard-panel, body.mode-overlay .gear-selector {
            opacity: 0 !important; pointer-events: none; transform: scale(0.9); transition: 0.3s;
        }

        /* --- 5. GAUGES --- */
        .gauge-container { position: relative; width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; }
        .gauge-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotate(135deg); filter: drop-shadow(0 0 5px var(--theme-shadow)); }
        .gauge-svg circle { fill: none; stroke-width: 3; stroke-linecap: round; }
        .panel-right .gauge-svg { transform: scaleX(-1) rotate(135deg); }
        .circle-bg { stroke: rgba(255,255,255,0.1); }
        .circle-val { stroke: var(--theme-color); transition: stroke-dashoffset 0.1s linear; }
        .gauge-info { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 100%; }
        .val-text { display: block; font-size: 16px; font-weight: 700; color: #fff; line-height: 0.9; text-shadow: 0 0 10px var(--theme-shadow); }
        .unit-text { font-size: 8px; color: #aaa; margin-top: 2px; font-weight: 500; text-transform: lowercase; letter-spacing: 1px; }

        /* --- 6. POPUPS & DOCKS --- */
        .contacts-container, .playlist-container {
            width: 500px; height: 50vh; background: var(--glass-bg);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 30px;
            padding: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.8); overflow-y: auto;
        }
        .contact-item, .playlist-item {
            display: flex; align-items: center; gap: 15px; padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; border-radius: 15px;
        }
        .contact-item:hover, .playlist-item:hover { background: rgba(255,255,255,0.1); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #222; display: flex; justify-content: center; align-items: center; font-size: 18px; color: #888; border: 1px solid #333; }
        .playlist-item.active-song { background: rgba(255,255,255,0.1); border: 1px solid var(--theme-color); box-shadow: 0 0 15px rgba(0,242,255,0.2); }
        
        .vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,1) 100%); z-index: 1; pointer-events: none; }

        .status-bar { position: absolute; top: 30px; left: 40px; display: flex; align-items: center; gap: 15px; font-size: 18px; font-weight: 600; color: #ddd; z-index: 20; text-shadow: 0 2px 5px rgba(0,0,0,1); }
        
        .gear-selector { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 20; transition: opacity 0.4s ease; }
        .gear-btn { width: 45px; height: 45px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #444, #111); border: 1px solid #555; display: flex; justify-content: center; align-items: center; font-weight: 700; font-size: 16px; color: #999; text-shadow: 0 0 5px rgba(255,255,255,0.2); box-shadow: 0 5px 15px rgba(0,0,0,0.9); cursor: pointer; }
        .gear-btn.active { background: radial-gradient(circle at 30% 30%, #fff, #ddd); color: #000; border: none; box-shadow: 0 0 15px var(--theme-color), 0 0 40px var(--theme-shadow); transform: scale(1.1); }

        .bottom-area { position: absolute; bottom: 25px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 50px; z-index: 20; }
        .glass-dock { height: 55px; background: linear-gradient(180deg, rgba(20,20,20,0.95) 0%, rgba(0,0,0,1) 100%); border: 1px solid rgba(255,255,255,0.15); border-radius: 28px; display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.95); }
        .dock-left { width: 40%; justify-content: space-evenly; }
        .app-icon { width: 18px; opacity: 0.6; cursor: pointer; transition: 0.3s; }
        .app-icon:hover, .app-icon.active { opacity: 1; transform: scale(1.15); filter: drop-shadow(0 0 6px var(--theme-color)); }
        .app-icon img { width: 100%; filter: brightness(0) invert(1); }
        .dock-right { width: 40%; padding: 0 20px; gap: 12px; }
        .album-art { width: 32px; height: 32px; border-radius: 50%; background-color: #333; background-size: cover; background-position: center; border: 1px solid rgba(255,255,255,0.3); transition: box-shadow 0.3s ease; }
        .album-art.playing { box-shadow: 0 0 15px var(--theme-color); animation: pulse-glow 2s infinite; }
        @keyframes pulse-glow { 0% { box-shadow: 0 0 5px var(--theme-color); } 50% { box-shadow: 0 0 20px var(--theme-color); } 100% { box-shadow: 0 0 5px var(--theme-color); } }
        .track-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .song-title { font-size: 12px; font-weight: 700; color: #fff; }
        .song-meta { font-size: 9px; color: #aaa; margin-top: 1px; }
        .controls { display: flex; gap: 12px; font-size: 14px; color: #fff; }
        .controls i { cursor: pointer; transition: 0.2s; }
        .controls i:hover { text-shadow: 0 0 8px var(--theme-color); color: var(--theme-color); }

    </style>
</head>
<body>

    <div class="scan-overlay"></div> <div class="background-layer"></div>
    <div class="vignette"></div>

    <div class="layer" id="layer-map"><iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d243647.31604070624!2d78.40804555!3d17.41262745!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bcb99daeaebd2c7%3A0xae93b78392bafbc2!2sHyderabad%2C%20Telangana!5e0!3m2!1sen!2sin!4v1700000000000!5m2!1sen!2sin" style="width:100%; height:100%; border:none; filter: invert(90%) hue-rotate(180deg) contrast(90%) grayscale(20%);"></iframe></div>
    <div class="layer" id="layer-contacts">
        <div class="contacts-container">
            <h2 style="margin-bottom: 20px;">Contacts</h2>
            <div class="contact-item"><div class="avatar"><i class="fas fa-user"></i></div><div class="contact-info"><h3>Mom</h3><p>+1 234 567 890</p></div><div class="call-btn"><i class="fas fa-phone"></i></div></div>
            <div class="contact-item"><div class="avatar"><i class="fas fa-building"></i></div><div class="contact-info"><h3>Work</h3><p>+1 987 654 321</p></div><div class="call-btn"><i class="fas fa-phone"></i></div></div>
        </div>
    </div>
    <div class="layer" id="layer-playlist">
        <div class="playlist-container"><h2 style="margin-bottom: 20px;">Now Playing</h2><div id="playlist-items-container"></div></div>
    </div>

    <div class="status-bar">
        <i class="fas fa-wifi"></i><span id="live-clock">--:--</span><span id="live-date" style="opacity: 0.6; font-weight: 400; margin-left: 10px;">---</span>
    </div>

    <div class="gear-selector">
        <div class="gear-btn">P</div><div class="gear-btn active">R</div><div class="gear-btn">N</div><div class="gear-btn">D</div>
    </div>

    <div class="dashboard-panel panel-left">
        <div class="gauge-container"><svg class="gauge-svg" viewBox="0 0 100 100"><circle class="circle-bg" cx="50" cy="50" r="45"></circle><circle class="circle-val" cx="50" cy="50" r="45" stroke-dasharray="283" stroke-dashoffset="120"></circle></svg><div class="gauge-info"><span class="val-text" id="gauge-clock">--:--</span><span class="unit-text" id="gauge-ampm">pm</span></div></div>
        <div class="gauge-container"><svg class="gauge-svg" viewBox="0 0 100 100"><circle class="circle-bg" cx="50" cy="50" r="45"></circle><circle class="circle-val" cx="50" cy="50" r="45" stroke-dasharray="283" stroke-dashoffset="150"></circle></svg><div class="gauge-info"><span class="val-text">20°C</span><span class="unit-text">temp</span></div></div>
        <div class="gauge-container"><svg class="gauge-svg" viewBox="0 0 100 100"><circle class="circle-bg" cx="50" cy="50" r="45"></circle><circle class="circle-val" cx="50" cy="50" r="45" stroke-dasharray="283" stroke-dashoffset="90"></circle></svg><div class="gauge-info"><span class="val-text">75%</span><span class="unit-text">vol</span></div></div>
    </div>

    <div class="dashboard-panel panel-right">
        <div class="gauge-container"><svg class="gauge-svg" viewBox="0 0 100 100"><circle class="circle-bg" cx="50" cy="50" r="45"></circle><circle id="speed-ring" class="circle-val" cx="50" cy="50" r="45" stroke-dasharray="283" stroke-dashoffset="283"></circle></svg><div class="gauge-info"><span id="speed-val" class="val-text" style="font-size: 28px;">0</span><span class="unit-text">km/h<br>speed</span></div></div>
        <div class="gauge-container"><svg class="gauge-svg" viewBox="0 0 100 100"><circle class="circle-bg" cx="50" cy="50" r="45"></circle><circle class="circle-val" cx="50" cy="50" r="45" stroke-dasharray="283" stroke-dashoffset="130"></circle></svg><div class="gauge-info"><span class="val-text">60%</span><span class="unit-text">fuel</span></div></div>
        <div class="gauge-container"><svg class="gauge-svg" viewBox="0 0 100 100"><circle class="circle-bg" cx="50" cy="50" r="45"></circle><circle class="circle-val" cx="50" cy="50" r="45" stroke-dasharray="283" stroke-dashoffset="190"></circle></svg><div class="gauge-info"><span class="val-text">32km</span><span class="unit-text">range</span></div></div>
    </div>

    <div class="bottom-area">
        <div class="glass-dock dock-left">
            <div class="app-icon active" id="btn-home" data-target="home"><img src="{% static 'car_dashboard/images/car.png' %}"></div>
            <div class="app-icon" id="btn-map" data-target="layer-map"><img src="{% static 'car_dashboard/images/map.png' %}"></div>
            <div class="app-icon" id="btn-phone" data-target="layer-contacts"><img src="{% static 'car_dashboard/images/call.log.png' %}"></div>
            <div class="app-icon" id="btn-music" data-target="layer-playlist"><img src="{% static 'car_dashboard/images/vaadin_music.png' %}"></div>
            <div class="app-icon" id="settings-btn"><img src="{% static 'car_dashboard/images/settings.png' %}"></div>
            <div class="app-icon"><img src="{% static 'car_dashboard/images/person.png' %}"></div>
        </div>
        <div class="glass-dock dock-right">
            <div class="album-art"></div>
            <div class="track-info"><div class="song-title">Mockingbird</div><div class="song-meta">Eminem</div></div>
            <div class="controls"><i class="fas fa-backward" id="prev-btn"></i><i class="fas fa-play" id="play-btn"></i><i class="fas fa-forward" id="next-btn"></i></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            /* --- 1. AUDIO --- */
            const clickSfx = new Audio("{% static 'car_dashboard/audio/speed_sound.mp3' %}");
            clickSfx.volume = 1.0; 
            const audioPlayer = new Audio();

            function playClick() {
                clickSfx.currentTime = 0;
                clickSfx.play().catch(e => {});
            }

            /* --- 2. ADVANCED ANIMATION SEQUENCER --- */
            function startSystem() {
                // Step 1: Scan
                document.body.classList.add('scanning');
                // Step 2: Car Flash (Ignition)
                document.body.classList.add('car-animating');
                
                // Step 3: Holographic Panel Entry (Delay 500ms)
                setTimeout(() => {
                    document.body.classList.add('panels-active');
                }, 500);

                // Step 4: Gauge Sweep (Delay 1000ms)
                setTimeout(() => {
                    const speedRing = document.getElementById('speed-ring');
                    if(speedRing) {
                        speedRing.style.transition = "stroke-dashoffset 0.8s ease-in-out";
                        speedRing.style.strokeDashoffset = "80"; // Max
                        setTimeout(() => {
                            speedRing.style.strokeDashoffset = "283"; // Zero
                            setTimeout(() => { speedRing.style.transition = "stroke-dashoffset 0.1s linear"; }, 800);
                        }, 1000);
                    }
                }, 1000);

                // Step 5: Digital Decrypt Effect on Speed (Delay 2000ms)
                setTimeout(() => {
                    let decryptCount = 0;
                    const speedVal = document.getElementById('speed-val');
                    const decryptInterval = setInterval(() => {
                        speedVal.innerText = Math.floor(Math.random() * 99);
                        decryptCount++;
                        if(decryptCount > 10) {
                            clearInterval(decryptInterval);
                            speedVal.innerText = "0"; // Lock to zero
                        }
                    }, 50);
                }, 1800);
            }
            // Trigger Startup
            startSystem();


            /* --- 3. SONGS DATA --- */
            const songs = [
                { title: "Mockingbird", artist: "Eminem", cover: "https://upload.wikimedia.org/wikipedia/en/6/60/Eminem_-_Mockingbird.jpg", src: "{% static 'car_dashboard/audio/mockingbird.mp3' %}" },
                { title: "Starboy", artist: "The Weeknd", cover: "https://upload.wikimedia.org/wikipedia/en/3/39/The_Weeknd_-_Starboy.png", src: "{% static 'car_dashboard/audio/starboy.mp3' %}" },
                { title: "Metamorphosis", artist: "Interworld", cover: "https://i1.sndcdn.com/artworks-5058e578-8314-43cb-b003-81b4380f5556-0-t500x500.jpg", src: "{% static 'car_dashboard/audio/metamorphosis.mp3' %}" }
            ];
            let songIndex = 0;
            let isPlaying = false;

            /* --- 4. NAVIGATION --- */
            const navButtons = document.querySelectorAll('.dock-left .app-icon[data-target]');
            const layers = document.querySelectorAll('.layer:not(.background-layer)');
            navButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    playClick();
                    document.querySelectorAll('.app-icon').forEach(icon => icon.classList.remove('active'));
                    btn.classList.add('active');
                    layers.forEach(layer => layer.classList.remove('active'));
                    const targetId = btn.getAttribute('data-target');
                    if (targetId === 'home') document.body.classList.remove('mode-overlay');
                    else {
                        document.body.classList.add('mode-overlay');
                        const targetLayer = document.getElementById(targetId);
                        if(targetLayer) targetLayer.classList.add('active');
                    }
                });
            });

            /* --- 5. PLAYER --- */
            const titleEl = document.querySelector('.song-title');
            const metaEl = document.querySelector('.song-meta');
            const artEl = document.querySelector('.album-art');
            const playBtn = document.getElementById('play-btn');
            const nextBtn = document.getElementById('next-btn');
            const prevBtn = document.getElementById('prev-btn');
            loadSong(0);

            function loadSong(index) {
                const song = songs[index];
                if(titleEl) titleEl.innerText = song.title;
                if(metaEl) metaEl.innerText = song.artist;
                if(artEl) artEl.style.backgroundImage = `url('${song.cover}')`;
                audioPlayer.src = song.src;
                if(isPlaying) audioPlayer.play();
                updatePlaylistHighlight();
            }

            if(playBtn) playBtn.addEventListener('click', () => {
                playClick();
                if (isPlaying) {
                    audioPlayer.pause(); playBtn.classList.remove('fa-pause'); playBtn.classList.add('fa-play'); if(artEl) artEl.classList.remove('playing');
                } else {
                    audioPlayer.play(); playBtn.classList.remove('fa-play'); playBtn.classList.add('fa-pause'); if(artEl) artEl.classList.add('playing');
                }
                isPlaying = !isPlaying;
            });
            if(nextBtn) nextBtn.addEventListener('click', () => { playClick(); songIndex = (songIndex + 1) % songs.length; loadSong(songIndex); });
            if(prevBtn) prevBtn.addEventListener('click', () => { playClick(); songIndex = (songIndex - 1 + songs.length) % songs.length; loadSong(songIndex); });
            audioPlayer.addEventListener('ended', () => { songIndex = (songIndex + 1) % songs.length; loadSong(songIndex); });

            const playlistContainer = document.getElementById('playlist-items-container');
            if(playlistContainer) {
                songs.forEach((song, index) => {
                    const item = document.createElement('div');
                    item.classList.add('playlist-item');
                    item.innerHTML = `<div class="song-idx">${index+1}</div><div class="avatar" style="background-image: url('${song.cover}'); width:35px; height:35px; background-size:cover; border-radius:8px;"></div><div class="contact-info" style="margin-left:10px;"><h3 style="font-size:14px; margin:0;">${song.title}</h3><p style="font-size:11px; margin:0; color:#888;">${song.artist}</p></div>`;
                    item.addEventListener('click', () => { playClick(); songIndex = index; loadSong(songIndex); });
                    playlistContainer.appendChild(item);
                });
            }
            function updatePlaylistHighlight() {
                document.querySelectorAll('.playlist-item').forEach((item, idx) => {
                    if(idx === songIndex) item.classList.add('active-song'); else item.classList.remove('active-song');
                });
            }

            /* --- 6. PHYSICS & GLOW --- */
            let currentSpeed = 0, targetSpeed = 0, isAccelerating = false;
            document.addEventListener('keydown', (e) => { if (e.key === 'ArrowUp' || e.key === 'w') { isAccelerating = true; targetSpeed = 220; } });
            document.addEventListener('keyup', (e) => { if (e.key === 'ArrowUp' || e.key === 'w') { isAccelerating = false; targetSpeed = 0; } });
            
            setInterval(() => {
                if (isAccelerating) { if (currentSpeed < targetSpeed) currentSpeed += 2; } else { if (currentSpeed > 0) currentSpeed -= 1; }
                const speedValEl = document.getElementById('speed-val');
                const speedRingEl = document.getElementById('speed-ring');
                if(speedValEl) {
                    speedValEl.innerText = Math.floor(currentSpeed);
                    let intensity = currentSpeed / 220;
                    let blurRadius = 10 + (intensity * 20);
                    speedValEl.style.textShadow = `0 0 ${blurRadius}px var(--theme-color)`;
                    if (currentSpeed > 150) {
                        let jX = (Math.random() - 0.5) * 2; let jY = (Math.random() - 0.5) * 2;
                        speedValEl.style.transform = `translate(${jX}px, ${jY}px)`;
                    } else { speedValEl.style.transform = `translate(0px, 0px)`; }
                }
                if(speedRingEl) {
                    const maxOffset = 283; const minOffset = 80;
                    const percentage = currentSpeed / 220;
                    speedRingEl.style.strokeDashoffset = maxOffset - (percentage * (maxOffset - minOffset));
                }
            }, 20);

            /* --- 7. CLOCK & THEME --- */
            function updateDashboard() {
                const now = new Date();
                let hours = now.getHours(); const minutes = String(now.getMinutes()).padStart(2, '0'); const ampm = hours >= 12 ? 'pm' : 'am';
                hours = hours % 12; hours = hours ? hours : 12; 
                const timeStr = `${hours}:${minutes}`;
                document.getElementById('live-clock').innerText = timeStr;
                document.getElementById('gauge-clock').innerText = timeStr;
                document.getElementById('gauge-ampm').innerText = ampm;
                const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']; const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                document.getElementById('live-date').innerText = `${days[now.getDay()]} ${months[now.getMonth()]} ${now.getDate()}`;
            }
            setInterval(updateDashboard, 1000); updateDashboard();

            const settingsBtn = document.getElementById('settings-btn');
            const root = document.documentElement;
            let themeState = 0; 
            if(settingsBtn) {
                settingsBtn.addEventListener('click', () => {
                    playClick(); themeState = (themeState + 1) % 3;
                    if(themeState === 0) { root.style.setProperty('--theme-color', '#00f2ff'); root.style.setProperty('--theme-shadow', 'rgba(0, 242, 255, 0.6)'); } 
                    else if (themeState === 1) { root.style.setProperty('--theme-color', '#ff3333'); root.style.setProperty('--theme-shadow', 'rgba(255, 50, 50, 0.6)'); } 
                    else { root.style.setProperty('--theme-color', '#33ffaa'); root.style.setProperty('--theme-shadow', 'rgba(50, 255, 170, 0.5)'); }
                });
            }
            const gears = document.querySelectorAll('.gear-btn');
            gears.forEach(gear => gear.addEventListener('click', function() { playClick(); gears.forEach(g => g.classList.remove('active')); this.classList.add('active'); }));
        });
    </script>
</body>
</html>
